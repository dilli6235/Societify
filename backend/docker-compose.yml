services:
  postgres:
    image: postgres:16-alpine
    container_name: society_saas_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: society_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host 5433 to avoid clashing with a native Postgres.app on 5432.
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Bootstrap the non-superuser app role (so RLS is actually enforced).
      - ./prisma/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: society_saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
